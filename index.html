<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>単語クイズ</title>
<!-- Google Fonts削除（オフライン対応のため）。システムフォントで代替 -->
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    overflow: hidden;
    background: #f4ede2;
    font-family: 'Shippori Mincho', 'Hiragino Mincho ProN', 'Yu Mincho', 'YuMincho', serif;
    color: #1a1a1a;
    user-select: none;
    -webkit-user-select: none;
  }
  body {
    background-image:
      radial-gradient(circle at 20% 30%, rgba(180,140,90,0.08) 0%, transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(80,50,30,0.06) 0%, transparent 50%);
    display: flex;
    flex-direction: column;
    padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
  }

  .header {
    padding: 20px 24px 12px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    border-bottom: 1px solid rgba(0,0,0,0.12);
  }
  .title {
    font-family: 'Cormorant Garamond', 'Georgia', 'Times New Roman', serif;
    font-style: italic;
    font-size: 22px;
    letter-spacing: 0.02em;
    color: #2a1f15;
  }
  .counter {
    font-family: 'Cormorant Garamond', 'Georgia', 'Times New Roman', serif;
    font-size: 16px;
    color: #6b5840;
    letter-spacing: 0.1em;
  }

  .progress {
    height: 2px;
    background: rgba(0,0,0,0.08);
    position: relative;
    overflow: hidden;
  }
  .progress-bar {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    background: linear-gradient(90deg, #8b6b3d, #3a2818);
    width: 0%;
    transition: width 0.4s cubic-bezier(0.22, 1, 0.36, 1);
  }

  .card-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    perspective: 1200px;
    cursor: pointer;
    position: relative;
  }

  .card {
    width: 100%;
    max-width: 480px;
    min-height: 60vh;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.6s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .card.flipped { transform: rotateY(180deg); }

  .face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    background: #faf5ec;
    border: 1px solid rgba(0,0,0,0.15);
    border-radius: 4px;
    box-shadow:
      0 1px 0 rgba(255,255,255,0.6) inset,
      0 20px 40px -20px rgba(60,40,20,0.25),
      0 4px 12px -4px rgba(60,40,20,0.15);
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 32px 28px;
    overflow-y: auto;
  }
  .face::before {
    content: "";
    position: absolute;
    inset: 8px;
    border: 1px solid rgba(80,55,30,0.15);
    border-radius: 2px;
    pointer-events: none;
  }
  .face-back {
    transform: rotateY(180deg);
    background: #2a1f15;
    color: #f4ede2;
    border-color: #1a120a;
  }
  .face-back::before {
    border-color: rgba(244,237,226,0.2);
  }

  .label {
    font-family: 'Cormorant Garamond', 'Georgia', 'Times New Roman', serif;
    font-style: italic;
    font-size: 13px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    opacity: 0.5;
    margin-bottom: 24px;
    text-align: center;
  }
  .content {
    font-size: clamp(20px, 5vw, 30px);
    line-height: 1.5;
    text-align: center;
    font-weight: 600;
    word-break: break-word;
  }
  .face-back .content {
    font-weight: 400;
    font-size: clamp(16px, 4vw, 22px);
  }
  .hint {
    margin-top: 24px;
    font-family: 'Cormorant Garamond', 'Georgia', 'Times New Roman', serif;
    font-size: 12px;
    letter-spacing: 0.25em;
    text-align: center;
    opacity: 0.4;
    text-transform: uppercase;
  }

  .controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 24px 20px;
    gap: 12px;
    border-top: 1px solid rgba(0,0,0,0.12);
  }
  .btn {
    background: transparent;
    border: 1px solid rgba(0,0,0,0.25);
    color: #2a1f15;
    padding: 10px 18px;
    font-family: 'Cormorant Garamond', 'Georgia', 'Times New Roman', serif;
    font-size: 14px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    border-radius: 2px;
    flex: 1;
    max-width: 130px;
  }
  .btn:active {
    background: #2a1f15;
    color: #f4ede2;
    transform: scale(0.97);
  }
  .btn-next {
    background: #2a1f15;
    color: #f4ede2;
    border-color: #2a1f15;
  }
  .btn-next:active {
    background: #f4ede2;
    color: #2a1f15;
  }

  .done {
    text-align: center;
    padding: 40px 24px;
  }
  .done h2 {
    font-family: 'Cormorant Garamond', 'Georgia', 'Times New Roman', serif;
    font-style: italic;
    font-size: 32px;
    margin-bottom: 12px;
  }
  .done p {
    opacity: 0.6;
    margin-bottom: 28px;
    font-size: 14px;
    letter-spacing: 0.05em;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .face > * { animation: fadeIn 0.5s ease both; }
  .face > *:nth-child(2) { animation-delay: 0.1s; }
  .face > *:nth-child(3) { animation-delay: 0.2s; }
</style>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">

<body>
  <div class="header">
    <div class="title">単語帳</div>

        <div class="label">Question</div>
        <div class="content" id="frontContent"></div>
        <div class="hint">tap to reveal</div>
      </div>
      <div class="face face-back">
        <div class="label">Answer</div>
        <div class="content" id="backContent"></div>
        <div class="hint">tap for next</div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button class="btn" id="shuffleBtn">SHUFFLE</button>
    <button class="btn btn-next" id="nextBtn">NEXT →</button>
  </div>

let questions = [];
let currentIndex = 0;
let isFlipped = false;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function render() {
  if (currentIndex >= questions.length) {
    document.getElementById('cardArea').innerHTML = `
      <div class="done">
        <h2>Finis.</h2>
        <p>全${questions.length}問 終了しました</p>
        <button class="btn btn-next" onclick="restart()">RESTART</button>
      </div>`;
    document.getElementById('counter').textContent = `${questions.length} / ${questions.length}`;
    document.getElementById('progressBar').style.width = '100%';
    return;
  }
  const q = questions[currentIndex];
  document.getElementById('frontContent').textContent = q.q;
  document.getElementById('backContent').textContent = q.a;
  document.getElementById('counter').textContent = `${currentIndex + 1} / ${questions.length}`;
  document.getElementById('progressBar').style.width = `${(currentIndex / questions.length) * 100}%`;
  isFlipped = false;
  document.getElementById('card').classList.remove('flipped');
}

function flipOrNext() {
  if (currentIndex >= questions.length) return;
  if (!isFlipped) {
    isFlipped = true;
    document.getElementById('card').classList.add('flipped');
  } else {
    currentIndex++;
    render();
  }
}

function next() {
  if (currentIndex >= questions.length) return;
  currentIndex++;
  render();
}

function restart() {
  questions = shuffle(allQuestions);
  currentIndex = 0;
  document.getElementById('cardArea').innerHTML = `
    <div class="card" id="card">
      <div class="face face-front">
        <div class="label">Question</div>
        <div class="content" id="frontContent"></div>
        <div class="hint">tap to reveal</div>
      </div>
      <div class="face face-back">
        <div class="label">Answer</div>
        <div class="content" id="backContent"></div>
        <div class="hint">tap for next</div>
      </div>
    </div>`;
  document.getElementById('cardArea').addEventListener('click', flipOrNext);
  render();
}

document.getElementById('cardArea').addEventListener('click', flipOrNext);
document.getElementById('shuffleBtn').addEventListener('click', (e) => {
  e.stopPropagation();
  restart();
});
document.getElementById('nextBtn').addEventListener('click', (e) => {
  e.stopPropagation();
  next();
});

questions = shuffle(allQuestions);
render();

// Service Worker登録（オフライン対応）
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(err => console.log('SW登録失敗:', err));
  });
}
